<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord Widget for Stream</title>
    <style>
        /* Обнуляем отступы для OBS */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
        }

        /* Контейнер виджета */
        .widget-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #ff7b00, #e65c00); /* Оранжевый градиент */
            padding: 15px 25px;
            border-radius: 8px; /* Небольшое скругление углов */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); /* Легкая тень */
            
            /* Начальное состояние: спрятано слева */
            transform: translateX(-150%);
            opacity: 0;
            
            /* Плавные переходы для выезда и смены текста */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        opacity 0.4s ease,
                        width 0.3s ease;
        }

        /* Класс для выезда на экран */
        .widget-container.show {
            transform: translateX(0);
            opacity: 1;
        }

        /* Иконка Discord */
        .discord-icon {
            width: 32px;
            height: 32px;
            margin-right: 15px;
            fill: #ffffff;
            flex-shrink: 0;
        }

        /* Текст внутри плашки */
        .widget-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            
            /* Эффект плавного исчезновения текста при смене */
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 1;
            transform: scale(1);
        }

        /* Класс для плавной смены текста */
        .widget-text.fade {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="widget-container" id="discordWidget">
        <!-- SVG-иконка Discord -->
        <svg class="discord-icon" viewBox="0 0 127.14 96.36">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.95,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.66-10.85,68.43,68.43,0,0,1-10.5-5c.88-.65,1.72-1.34,2.53-2a75.58,75.58,0,0,0,73,0c.81.7,1.65,1.39,2.53,2a68.43,68.43,0,0,1-10.5,5,74.37,74.37,0,0,0,6.66,10.85,105.73,105.73,0,0,0,31-18.83C130,50.22,123.82,27.41,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
        </svg>
        <div class="widget-text" id="widgetText">Заходи на наш дискорд</div>
    </div>

    <script>
        const widget = document.getElementById('discordWidget');
        const textNode = document.getElementById('widgetText');

        // Настройки текстов
        const TEXT_1 = "Заходи на наш дискорд";
        const TEXT_2 = "Ссылка в описании";

        // Тайминги (в миллисекундах)
        const FIRST_TEXT_DURATION = 15000;  // 15 секунд для первого текста
        const SECOND_TEXT_DURATION = 5000;  // 5 секунд для второго текста
        const SLEEP_DURATION = 300000;      // 5 минут паузы между появлениями (300 000 мс)

        function changeTextAnimated(newText) {
            return new Promise((resolve) => {
                textNode.classList.add('fade'); // Скрываем старый текст
                setTimeout(() => {
                    textNode.innerText = newText; // Меняем текст
                    textNode.classList.remove('fade'); // Показываем новый текст
                    resolve();
                }, 200); // Время на исчезновение текста
            });
        }

        function startWidgetCycle() {
            // Убеждаемся, что стоит первый текст, и выезжаем
            textNode.innerText = TEXT_1;
            widget.classList.add('show');

            // Шаг 1: Ждем 15 секунд первого текста
            setTimeout(async () => {
                
                // Шаг 2: Анимированно меняем текст на "Ссылка в описании"
                await changeTextAnimated(TEXT_2);

                // Шаг 3: Держим плашку на экране еще 5 секунд
                setTimeout(() => {
                    // Шаг 4: Прячем плашку налево
                    widget.classList.remove('show');
                    
                    // Шаг 5: Ждем 5 минут перед следующим запуском цикла
                    setTimeout(startWidgetCycle, SLEEP_DURATION);

                }, SECOND_TEXT_DURATION);

            }, FIRST_TEXT_DURATION);
        }

        // Запуск при загрузке страницы в OBS
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(startWidgetCycle, 1000); // Небольшая задержка при старте для плавности
        });
    </script>
</body>
</html>
